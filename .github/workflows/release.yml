name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version and auto-bump
        id: bump
        run: |
          CUR=$(python3 -c "exec(open('config.py').read()); print(VERSION)")

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CUR"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"

          # Check if this version tag already exists
          if git tag -l "v${CUR}" | grep -q .; then
            echo "Tag v${CUR} exists, bumping to v${NEW}"
            echo "version=${NEW}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v${CUR} doesn't exist yet, releasing v${CUR}"
            echo "version=${CUR}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update config.py if bumped
        if: steps.bump.outputs.bumped == 'true'
        run: |
          VER="${{ steps.bump.outputs.version }}"
          sed -i "s/^VERSION = .*/VERSION = \"${VER}\"/" config.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.py
          git commit -m "chore: bump version to ${VER} [skip ci]"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.bump.outputs.version }}"

          # Generate changelog from commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges | grep -v "Co-Authored-By" | grep -v "\[skip ci\]")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" -20 --no-merges | grep -v "Co-Authored-By")
          fi

          gh release create "v${VER}" \
            --title "v${VER}" \
            --notes "## Changes

          ${CHANGELOG}

          ## Install / Update

          \`\`\`bash
          # New install
          curl -fsSL https://raw.githubusercontent.com/barjakuzu/claude-rc-launcher/main/install.sh | bash

          # Update existing
          claude-rc update
          \`\`\`"
