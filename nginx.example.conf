# Claude RC Launcher — nginx reverse proxy example
#
# 1. Replace YOUR_DOMAIN with your actual domain.
# 2. Set up SSL with Let's Encrypt:
#      sudo certbot --nginx -d YOUR_DOMAIN
# 3. Generate a basic-auth password file:
#      sudo htpasswd -c /etc/nginx/.htpasswd admin
# 4. sudo ln -s /etc/nginx/sites-available/claude-rc /etc/nginx/sites-enabled/
# 5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Let's Encrypt managed — certbot will fill these in
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Basic auth
    auth_basic           "Claude RC Launcher";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
